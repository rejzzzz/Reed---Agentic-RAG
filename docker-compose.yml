version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag-pipeline-backend
    restart: unless-stopped
    # We remove the public port mapping here. 
    # Caddy will communicate with it internally on port 8000.
    env_file:
      - ./backend/.env
    volumes:
      # Mount ChromaDB directory as a persistent volume
      - chromadb_data:/app/data/chroma_db

  caddy:
    image: caddy:latest
    container_name: rag-pipeline-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

volumes:
  chromadb_data:
    name: rag-pipeline-chromadb-data
  caddy_data:
    name: rag-pipeline-caddy-data
  caddy_config:
    name: rag-pipeline-caddy-config
